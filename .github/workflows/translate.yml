---
name: Translate README

on:
  push:
    branches:
      - main
    paths:
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  translate-and-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Translate to Traditional Chinese
        uses: FidelusAleksander/ai-translate-action@v1
        id: translate-zh-tw
        with:
          text-file: "README.md"
          target-language: "zh-TW"
          custom-instructions: >-
            Keep technical terms and code snippets in English.
            Don't translate URLs, file paths, or code blocks.
            Preserve markdown formatting.

      - name: Translate to Simplified Chinese
        uses: FidelusAleksander/ai-translate-action@v1
        id: translate-zh-cn
        with:
          text-file: "README.md"
          target-language: "zh-CN"
          custom-instructions: >-
            Keep technical terms and code snippets in English.
            Don't translate URLs, file paths, or code blocks.
            Preserve markdown formatting.

      - name: Translate to Japanese
        uses: FidelusAleksander/ai-translate-action@v1
        id: translate-ja
        with:
          text-file: "README.md"
          target-language: "ja"
          custom-instructions: >-
            Keep technical terms and code snippets in English.
            Don't translate URLs, file paths, or code blocks.
            Preserve markdown formatting.

      - name: Save translations
        run: |
          mkdir -p docs/readme
          echo "$ZH_TW" > docs/readme/README.zh-TW.md
          echo "$ZH_CN" > docs/readme/README.zh-CN.md
          echo "$JA" > docs/readme/README.ja.md
          ls -la docs/readme/
        env:
          ZH_TW: ${{ steps.translate-zh-tw.outputs.translated-text }}
          ZH_CN: ${{ steps.translate-zh-cn.outputs.translated-text }}
          JA: ${{ steps.translate-ja.outputs.translated-text }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "docs: update README translations"
          title: "docs: update README translations"
          body: |
            This PR updates all translations of the README.

            Changes were automatically generated using the
            [ai-translate-action](https://github.com/FidelusAleksander/ai-translate-action).

            ## Translated Languages
            - Traditional Chinese (zh-TW)
            - Simplified Chinese (zh-CN)
            - Japanese (ja)
          branch: docs/update-readme-translations
          add-paths: "docs/readme/README*"
          delete-branch: true
          labels: |
            documentation
